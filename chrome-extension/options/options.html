<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Frame — Extension Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
      color: #1a1a2e;
    }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .subtitle { color: #6b7280; font-size: 13px; margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    .field input:focus { border-color: #1a1a2e; }
    .field .help { font-size: 11px; color: #9ca3af; margin-top: 4px; }
    .btn {
      padding: 10px 20px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #2d2d4e; }
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .status.success { display: block; background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .status.error { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
  </style>
</head>
<body>
  <h1>⬡ The Frame — Settings</h1>
  <p class="subtitle">Configure your connection to The Frame CRM</p>

  <div class="field">
    <label for="frame-url">Frame URL</label>
    <input id="frame-url" type="url" placeholder="https://theframe.getjaxy.com" />
    <div class="help">The URL where your Frame CRM is hosted</div>
  </div>

  <div class="field">
    <label for="api-key">API Key</label>
    <input id="api-key" type="password" placeholder="Enter your API key" />
    <div class="help">Generate an API key in The Frame → Settings → API Keys</div>
  </div>

  <button id="btn-save" class="btn">Save & Test Connection</button>
  <div id="status" class="status"></div>

  <script src="options.js"></script>
</body>
</html>
