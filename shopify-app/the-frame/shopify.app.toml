# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "7a1d1bd5bb328d1928a9e73835ff2726"
application_url = "https://example.com"
embedded = true
name = "the-frame"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# Internal Jaxy app — broad scopes for catalog, orders, inventory, fulfillment,
# discounts, content, and metaobjects. Excluded: payouts (write), staff users,
# legal policies, payment terms, and managing other apps.
scopes = "read_products,write_products,read_orders,write_orders,read_customers,write_customers,read_inventory,write_inventory,read_fulfillments,write_fulfillments,read_locations,read_assigned_fulfillment_orders,write_assigned_fulfillment_orders,read_merchant_managed_fulfillment_orders,write_merchant_managed_fulfillment_orders,read_third_party_fulfillment_orders,write_third_party_fulfillment_orders,read_product_listings,read_draft_orders,write_draft_orders,read_price_rules,write_price_rules,read_discounts,write_discounts,read_marketing_events,write_marketing_events,read_metaobject_definitions,write_metaobject_definitions,read_metaobjects,write_metaobjects,read_content,write_content,read_themes,write_themes,read_translations,write_translations,read_files,write_files,read_shipping,write_shipping,read_returns,write_returns,read_publications,write_publications,read_online_store_pages,write_online_store_pages,read_online_store_navigation,write_online_store_navigation,read_resource_feedbacks,write_resource_feedbacks,read_script_tags,write_script_tags,read_shopify_payments_disputes,read_locales,read_gift_cards,write_gift_cards,read_companies,write_companies,read_purchase_options,write_purchase_options,read_validations,write_validations,read_order_edits,write_order_edits,read_custom_fulfillment_services,write_custom_fulfillment_services,read_checkouts"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
