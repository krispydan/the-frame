# Partners config for the-frame Shopify app.
# Push changes with: shopify app deploy
#
# This file controls Partners → App URL + redirect URLs + scopes + webhooks.
# Update SHOPIFY_APP_URL when switching between local (cloudflared) and prod.

client_id = "7a1d1bd5bb328d1928a9e73835ff2726"
application_url = "https://theframe.getjaxy.com"
embedded = false
name = "the-frame"

[access_scopes]
scopes = "read_products,write_products,read_orders,write_orders,read_customers,write_customers,read_inventory,write_inventory,read_fulfillments,write_fulfillments,read_locations,read_assigned_fulfillment_orders,write_assigned_fulfillment_orders,read_merchant_managed_fulfillment_orders,write_merchant_managed_fulfillment_orders,read_third_party_fulfillment_orders,write_third_party_fulfillment_orders,read_product_listings,read_draft_orders,write_draft_orders,read_price_rules,write_price_rules,read_discounts,write_discounts,read_marketing_events,write_marketing_events,read_metaobject_definitions,write_metaobject_definitions,read_metaobjects,write_metaobjects,read_content,write_content,read_themes,write_themes,read_translations,write_translations,read_files,write_files,read_shipping,write_shipping,read_returns,write_returns,read_publications,write_publications,read_online_store_pages,write_online_store_pages,read_online_store_navigation,write_online_store_navigation,read_resource_feedbacks,write_resource_feedbacks,read_script_tags,write_script_tags,read_shopify_payments_disputes,read_locales,read_gift_cards,write_gift_cards,read_companies,write_companies,read_purchase_options,write_purchase_options,read_validations,read_order_edits,write_order_edits,read_custom_fulfillment_services,write_custom_fulfillment_services,read_checkouts"

[webhooks]
api_version = "2025-07"

  # App lifecycle
  [[webhooks.subscriptions]]
  uri = "/api/webhooks/shopify/app-uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/api/webhooks/shopify/scopes-update"
  topics = [ "app/scopes_update" ]

  # Orders — live capture into the-frame.db
  [[webhooks.subscriptions]]
  uri = "/api/v1/webhooks/shopify"
  topics = [ "orders/create", "orders/updated", "orders/cancelled", "orders/paid", "orders/fulfilled" ]

  # Fulfillments — track shipping events from Shopify back to local order records
  [[webhooks.subscriptions]]
  uri = "/api/v1/webhooks/shopify"
  topics = [ "fulfillments/create", "fulfillments/update" ]

  # Inventory — keep stock counts in sync with the upstream Shopify warehouse
  [[webhooks.subscriptions]]
  uri = "/api/v1/webhooks/shopify"
  topics = [ "inventory_levels/update" ]

  # Customers — keep contacts in sync (companies + repeat-buyer detection)
  [[webhooks.subscriptions]]
  uri = "/api/v1/webhooks/shopify"
  topics = [ "customers/create", "customers/update" ]

  # Products — when a merchant edits product directly in Shopify, reflect locally
  [[webhooks.subscriptions]]
  uri = "/api/v1/webhooks/shopify"
  topics = [ "products/create", "products/update", "products/delete" ]

[auth]
# Both URLs allowed: production (real install) + localhost (local dev with .env.local SHOPIFY_APP_URL=http://localhost:3000).
redirect_urls = [
  "https://theframe.getjaxy.com/api/auth/shopify/callback",
  "http://localhost:3000/api/auth/shopify/callback",
]

[build]
